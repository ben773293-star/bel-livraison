  .tb-role.commercant{background:#eff6ff;color:#3b82f6;border:1px solid #bfdbfe;}
  .btn-logout{padding:8px 14px;background:var(--gris-clair);border:1.5px solid var(--gris);border-radius:8px;color:var(--texte-doux);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;}
  .btn-logout:hover{border-color:var(--rouge);color:var(--rouge);background:#fef2f2;}

  .nav{display:flex;gap:2px;padding:10px 20px;background:var(--blanc);border-bottom:1.5px solid var(--gris);overflow-x:auto;}
  .nav-btn{padding:9px 16px;border:none;background:transparent;color:var(--texte-leger);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border-radius:8px;white-space:nowrap;transition:all 0.2s;}
  .nav-btn:hover{background:var(--vert-pale);color:var(--vert);}
  .nav-btn.active{background:var(--vert-pale);color:var(--vert);}

  .main{flex:1;padding:24px;max-width:960px;margin:0 auto;width:100%;}
  .sec-title{font-family:'Fraunces',serif;font-size:22px;font-weight:800;color:var(--texte);margin-bottom:20px;}
  .sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px;}
  .stat{background:var(--blanc);border:1.5px solid var(--gris);border-radius:14px;padding:18px;position:relative;overflow:hidden;box-shadow:var(--ombre);}

  .stat-lbl{font-size:11px;color:var(--texte-leger);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
  .stat-val{font-family:'Fraunces',serif;font-size:28px;font-weight:800;margin:6px 0 3px;}
  .stat-val.g{color:var(--vert);}.stat-val.o{color:var(--or);}.stat-val.b{color:#3b82f6;}

  .profil-name{font-family:'Fraunces',serif;font-size:20px;font-weight:800;color:var(--texte);}
  .profil-sub{font-size:13px;color:var(--texte-leger);margin-top:3px;}
  .info-ligne{display:flex;justify-content:space-between;font-size:14px;padding:11px 0;border-bottom:1px solid var(--gris);}
  .info-ligne:last-child{border-bottom:none;}
  .info-lbl{color:var(--texte-leger);font-weight:500;}
  .info-val{font-weight:600;color:var(--texte);}

  .statut-sw{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
  .statut-btn{padding:10px 16px;border:1.5px solid var(--gris);border-radius:10px;background:var(--gris-clair);color:var(--texte-leger);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;}
  .statut-btn.act-disponible{background:var(--vert-pale);border-color:var(--vert-doux);color:var(--vert);}
  .statut-btn.act-en-course{background:var(--or-pale);border-color:#fcd34d;color:var(--or);}
  .statut-btn.act-hors-ligne{background:var(--gris-clair);border-color:var(--gris);color:var(--texte-leger);}

  /* SERIE */
  .serie-item{background:var(--blanc);border:1.5px solid var(--gris);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:var(--ombre);}
  .serie-num{width:32px;height:32px;background:var(--vert);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:800;font-size:14px;color:white;flex-shrink:0;}

  .serie-addr{font-size:14px;font-weight:600;color:var(--texte);}
  .serie-detail{font-size:12px;color:var(--texte-leger);margin-top:3px;}
  .serie-prix{font-family:'Fraunces',serif;font-size:16px;font-weight:800;color:var(--vert);}

  .empty{text-align:center;padding:48px 20px;color:var(--texte-leger);}
  .empty .ic{font-size:48px;margin-bottom:14px;}
  .empty p{font-size:15px;}
  .loading{text-align:center;padding:48px;color:var(--texte-leger);font-size:15px;}

  .toast-c{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;}
  .toast{background:var(--blanc);border:1.5px solid var(--gris);border-radius:12px;padding:13px 16px;font-size:14px;font-weight:600;max-width:320px;animation:si 0.3s ease;box-shadow:var(--ombre-md);}
  .toast.success{border-color:var(--vert-doux);background:var(--vert-pale);color:var(--vert);}
  .toast.warning{border-color:#fcd34d;background:var(--or-pale);color:#92400e;}

  @media(max-width:600px){
    .main{padding:14px;}
    .topbar{padding:0 14px;}
    .nav{padding:8px 14px;}
    .form-row{grid-template-columns:1fr;}
    .extras-grid{grid-template-columns:1fr;}
    .trajet-box{flex-direction:column;}
    .trajet-arrow{transform:rotate(90deg);padding:0;align-self:center;}
  }
</style>

<script>
const SUPABASE_URL='https://oklotjdbfeawqastqtyc.supabase.co';
const SUPABASE_KEY='sb_publishable_KDjEeMlP0jPKJTfGXx6QaQ_6HoK8BGj';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let currentUser=null,currentRole=null;

// ============================================================
// GRILLE TARIFAIRE
// ============================================================
const GRILLE=[
  {min:0,max:5,tarif:1000},{min:6,max:8,tarif:1300},
  {min:9,max:10,tarif:1500},{min:11,max:12,tarif:1800},
  {min:13,max:15,tarif:2000},{min:16,max:18,tarif:2500},
  {min:19,max:22,tarif:3000},{min:23,max:999,tarif:4000},
];

function getTarif(km,extras={lourd:false,express:false,nuit:false}){
  let t=GRILLE[GRILLE.length-1].tarif;
  for(const g of GRILLE){if(km>=g.min&&km<=g.max){t=g.tarif;break;}}
  if(extras.lourd)t+=500;
  if(extras.express)t+=500;
  if(extras.nuit)t+=500;
  t=Math.min(t,4000);
  return{tarif:t,livreur:Math.round(t*0.8),commission:Math.round(t*0.2)};
}

// ============================================================
// CALCUL DISTANCE GPS (Haversine)
// ============================================================
function haversine(lat1,lng1,lat2,lng2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return+(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
}

// ============================================================
// EXTRACTION COORDONNÉES depuis lien ou texte
// ============================================================
function extraireCoords(input){
  input=input.trim();
  // Format: "12.3456, -1.6789" ou "12.3456,-1.6789"
  const coordRegex=/(-?\d{1,3}\.\d+)[,\s]+(-?\d{1,3}\.\d+)/;
  // Liens Google Maps: ?q=lat,lng ou @lat,lng ou maps?ll=lat,lng
  const patterns=[
    /[?&]q=(-?\d+\.?\d*),(-?\d+\.?\d*)/,
    /@(-?\d+\.?\d*),(-?\d+\.?\d*)/,
    /ll=(-?\d+\.?\d*),(-?\d+\.?\d*)/,
    /maps\/(-?\d+\.?\d*),(-?\d+\.?\d*)/,
    /place\/(-?\d+\.?\d*)\+(-?\d+\.?\d*)/,
    /\!3d(-?\d+\.?\d*)\!4d(-?\d+\.?\d*)/,
  ];
  for(const p of patterns){
    const m=input.match(p);
    if(m){
      const lat=parseFloat(m[1]),lng=parseFloat(m[2]);
      if(lat>=-90&&lat<=90&&lng>=-180&&lng<=180) return{lat,lng,source:'lien'};
    }
  }
  // Essai format coordonnées directes
  const m=input.match(coordRegex);
  if(m){
    const lat=parseFloat(m[1]),lng=parseFloat(m[2]);
    if(lat>=-90&&lat<=90&&lng>=-180&&lng<=180) return{lat,lng,source:'coordonnées'};
  }
  return null;
}

function lienGoogleMaps(lat,lng){
  return`https://www.google.com/maps?q=${lat},${lng}`;
}

function lienWhatsApp(tel,msg){
  return`https://wa.me/226${tel}?text=${encodeURIComponent(msg)}`;
}

// ============================================================
// INIT
// ============================================================
async function init(){
  const s=localStorage.getItem('bel_session');
  if(!s){window.location.href='index.html';return;}
  const session=JSON.parse(s);
  currentRole=session.role;
  const tbl=currentRole==='livreur'?'livreurs':'commercants';
  const{data}=await sb.from(tbl).select('*').eq('id',session.id).single();
  currentUser=data;
  if(!currentUser){window.location.href='index.html';return;}
  document.getElementById('tb-user').textContent=currentRole==='livreur'?currentUser.prenom+' '+currentUser.nom:currentUser.boutique;
  document.getElementById('tb-role').className='tb-role '+currentRole;
  document.getElementById('tb-role').textContent=currentRole==='livreur'?'🛵 Livreur':'🏪 Commerçant';
  buildNav();
  renderPage(currentRole==='livreur'?'lv-accueil':'cm-accueil');
}

function logout(){localStorage.removeItem('bel_session');window.location.href='index.html';}

function buildNav(){
  const tabs=currentRole==='livreur'?[
    {id:'lv-accueil',icon:'🏠',label:'Accueil'},
    {id:'lv-courses',icon:'📦',label:'Mes courses'},
    {id:'lv-gains',icon:'💰',label:'Mes gains'},
    {id:'lv-profil',icon:'👤',label:'Mon profil'},
  ]:[
    {id:'cm-accueil',icon:'🏠',label:'Accueil'},
    {id:'cm-nouvelle',icon:'📍',label:'Nouvelle livraison'},
    {id:'cm-serie',icon:'🚀',label:'Livraisons en série'},
    {id:'cm-suivi',icon:'🔍',label:'Mes livraisons'},
    {id:'cm-profil',icon:'👤',label:'Mon profil'},
  ];
  document.getElementById('nav').innerHTML=tabs.map(t=>`
    <button class="nav-btn" onclick="renderPage('${t.id}')" data-page="${t.id}">${t.icon} ${t.label}</button>`).join('');
}

function renderPage(id){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===id));
  const el=document.getElementById('main');
  el.innerHTML='<div class="loading">⏳ Chargement...</div>';
  const pages={
    'lv-accueil':pageLvAccueil,'lv-courses':pageLvCourses,'lv-gains':pageLvGains,'lv-profil':pageLvProfil,
    'cm-accueil':pageCmAccueil,'cm-nouvelle':pageCmNouvelle,'cm-serie':pageCmSerie,
    'cm-suivi':pageCmSuivi,'cm-profil':pageCmProfil
  };
  if(pages[id])pages[id](el);

function sLabel(s){return{'en-attente':'En attente','assignee':'Assignée','collecte':'En cours','livree':'Livrée','paye':'Payée'}[s]||s;}

function toast(msg,type='success'){
  const c=document.getElementById('toast-c');
  const t=document.createElement('div');
  t.className='toast '+type;
  t.textContent=(type==='success'?'✅ ':'⚠️ ')+msg;
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.4s';setTimeout(()=>t.remove(),400);},4000);
}

function getSuiviBadge(statut){
  const cfg={
    'en-attente':{bg:'#eff6ff',color:'#3b82f6',dot:'#3b82f6',label:"En attente d'un livreur"},
    'assignee':{bg:var_or_pale,color:'#d97706',dot:'#d97706',label:'Livreur en route vers vous'},
    'collecte':{bg:var_vert_pale,color:'#1a6b3c',dot:'#2d9e5f',label:'Colis en route vers le client'},
    'livree':{bg:'#f0fdf4',color:'#16a34a',dot:'#16a34a',label:'Livré — Paiement attendu'},
    'paye':{bg:var_vert_pale,color:'#1a6b3c',dot:null,label:'Terminé ✅'},
  };
  const c=cfg[statut]||{bg:'#f4f4f0',color:'#7a7a72',dot:null,label:statut};
  return`<div class="suivi-badge" style="background:${c.bg};color:${c.color};border:1px solid ${c.color}30">
    ${c.dot?`<div class="suivi-dot" style="background:${c.dot}"></div>`:''}${c.label}
  </div>`;
}

function renderCmds(cmds,monTel='',livreurView=false){
  if(!cmds.length)return'<div class="empty"><div class="ic">📭</div><p>Aucune livraison pour le moment</p></div>';
  return cmds.map(c=>{
    let actions='';
    if(livreurView){
      if(c.statut==='assignee')actions=`<button class="btn btn-or" onclick="majStatut('${c.id}','collecte','lv-courses')">✅ Colis récupéré</button>`;
      else if(c.statut==='collecte')actions=`<button class="btn btn-green" onclick="majStatut('${c.id}','livree','lv-courses')">📦 Colis remis au client</button>`;
    }else{
      if(c.statut==='assignee')actions=`<button class="btn btn-green" onclick="majStatut('${c.id}','assignee','cm-suivi')">✅ Confirmer remise au livreur</button>`;
    }
    const dist=c.distance_km?`${c.distance_km} km`:'—';
    const extrasLabel=[c.extra_lourd?'📦 Lourd':'',c.extra_express?'⚡ Express':'',c.extra_nuit?'🌙 Nuit':''].filter(Boolean).join(' · ');
    const coordClient=c.lat_client&&c.lng_client?`${c.lat_client},${c.lng_client}`:null;
    return`<div class="cmd ${c.statut==='en-attente'?'urgent':''}">
      <div class="cmd-head">
        <div>
          <div class="cmd-id">${c.id} <span style="font-size:13px;color:var(--texte-leger);font-family:'Plus Jakarta Sans',sans-serif;font-weight:500">— ${c.commercant_nom||''}</span></div>
          <div class="cmd-meta">📦 ${c.colis||''}${c.livreur_nom?' · 🛵 '+c.livreur_nom:''} · 📅 ${new Date(c.created_at).toLocaleDateString('fr-FR')} · 📏 ${dist}${extrasLabel?' · '+extrasLabel:''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <span class="bs s-${c.statut}">${sLabel(c.statut)}</span>
          ${getSuiviBadge(c.statut)}
        </div>
      </div>
      <div class="trajet-box">
        <div class="trajet-pt">
          <div class="trajet-lbl">📍 Collecte (boutique)</div>
          <div class="trajet-addr">${c.collecte_addr||'—'}</div>
          ${c.lat_boutique&&c.lng_boutique?`<div class="trajet-coord">${c.lat_boutique}, ${c.lng_boutique}</div><a href="${lienGoogleMaps(c.lat_boutique,c.lng_boutique)}" target="_blank" style="font-size:12px;color:var(--vert);font-weight:600;margin-top:4px;display:inline-block">Voir sur Maps →</a>`:''}
        </div>
        <div class="trajet-arrow">→</div>
        <div class="trajet-pt">
          <div class="trajet-lbl">🏁 Dépôt (client)</div>
          <div class="trajet-addr">${c.depot_addr||'—'}</div>
          ${coordClient?`<div class="trajet-coord">${coordClient}</div><a href="${lienGoogleMaps(c.lat_client,c.lng_client)}" target="_blank" style="font-size:12px;color:var(--vert);font-weight:600;margin-top:4px;display:inline-block">Voir sur Maps →</a>`:''}
        </div>
      </div>
      ${['assignee','collecte','livree'].includes(c.statut)?`
      <div class="alert alert-info" style="margin-bottom:12px">
        💰 Tarif : <strong>${c.tarif?.toLocaleString()} F</strong> — Client paie sur <strong>${monTel||'N/A'}</strong> après réception
        ${coordClient?`<br>📍 <a href="${lienGoogleMaps(c.lat_client,c.lng_client)}" target="_blank" style="color:#1d4ed8;font-weight:700">Ouvrir la localisation client sur Maps</a>`:''}
      </div>`:''}
      ${actions?`<div style="display:flex;gap:8px;flex-wrap:wrap">${actions}</div>`:''}
    </div>`;
  }).join('');
}

// GPS Boutique automatique
function activerGpsCol(){
  const btn=document.getElementById('btn-gps-col');
  btn.disabled=true;btn.textContent='⏳ Localisation en cours...';
  if(!navigator.geolocation){
    toast('Géolocalisation non supportée sur ce navigateur','warning');
    btn.disabled=false;btn.innerHTML='📍 Activer ma localisation automatiquement';
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      gpsColX={lat:+pos.coords.latitude.toFixed(6),lng:+pos.coords.longitude.toFixed(6)};
      afficherGpsResult('gps-col-result',gpsColX,'Votre position détectée');
      btn.innerHTML='✅ Position détectée';
      btn.style.background='#16a34a';
      recalculerTarif();
      toast('📍 Position boutique détectée !');
    },
    err=>{
      btn.disabled=false;btn.innerHTML='📍 Activer ma localisation automatiquement';
      toast('Impossible d\'accéder à votre position. Collez vos coordonnées manuellement.','warning');
    },
    {enableHighAccuracy:true,timeout:10000}
  );
}

function traiterLienCol(){
  const val=document.getElementById('col-lien')?.value;
  if(!val||val.length<5)return;
  const coords=extraireCoords(val);
  if(coords){
    gpsColX=coords;
    afficherGpsResult('gps-col-result',coords,'Position boutique extraite');
    recalculerTarif();
  }
}

function traiterLienDep(){
  const val=document.getElementById('dep-lien')?.value;
  if(!val||val.length<5)return;
  const coords=extraireCoords(val);
  if(coords){
    gpsDepX=coords;
    afficherGpsResult('gps-dep-result',coords,'Position client extraite');
    recalculerTarif();
  }else{
    document.getElementById('gps-dep-result').innerHTML=`<div class="gps-card error"><div class="gps-label">Format non reconnu</div><div class="gps-coords" style="color:#dc2626">Essayez : 12.3456, -1.6789</div></div>`;
  }
}

function afficherGpsResult(containerId,coords,label){
  const el=document.getElementById(containerId);
  if(!el)return;
  el.innerHTML=`<div class="gps-card success">
    <div class="gps-label">✅ ${label}</div>
    <div class="gps-coords">${coords.lat}, ${coords.lng}</div>
    <a href="${lienGoogleMaps(coords.lat,coords.lng)}" target="_blank" style="font-size:12px;color:var(--vert);font-weight:700;margin-top:6px;display:inline-block">Vérifier sur Google Maps →</a>
  </div>`;
}

function toggleExtra(type){
  extrasX[type]=!extrasX[type];
  document.getElementById('ec-'+type)?.classList.toggle('checked',extrasX[type]);
  recalculerTarif();
}

function recalculerTarif(){
  if(!gpsColX||!gpsDepX){
    document.getElementById('tarif-result').style.display='none';
    return;
  }
  const dist=haversine(gpsColX.lat,gpsColX.lng,gpsDepX.lat,gpsDepX.lng);
  const result=getTarif(dist,extrasX);
  const supps=(extrasX.lourd?500:0)+(extrasX.express?500:0)+(extrasX.nuit?500:0);

  document.getElementById('tarif-result').style.display='block';
  document.getElementById('tr-montant').textContent=result.tarif.toLocaleString();
  document.getElementById('tr-dist').textContent=dist+' km';
  document.getElementById('tr-base').textContent=(result.tarif-supps).toLocaleString()+' F';
  document.getElementById('tr-extras').textContent=supps>0?'+ '+supps.toLocaleString()+' F':'Aucun';
  document.getElementById('tr-livreur').textContent=result.livreur.toLocaleString()+' F';
  document.getElementById('tr-comm').textContent=result.commission.toLocaleString()+' F';
  document.getElementById('tr-message').innerHTML=`📢 <strong>Dites à votre client :</strong> "Le tarif de livraison est de <strong>${result.tarif.toLocaleString()} F</strong>"`;
}

async function cmEnvoyer(){
  if(!gpsColX||!gpsDepX){toast('Les deux localisations sont requises','warning');return;}
  const colis=document.getElementById('n-colis')?.value.trim();
  if(!colis){toast('Renseignez la nature du colis','warning');return;}

  const colDesc=document.getElementById('col-desc')?.value.trim()||'Position GPS';
  const depDesc=document.getElementById('dep-desc')?.value.trim()||'Position GPS client';
  const dist=haversine(gpsColX.lat,gpsColX.lng,gpsDepX.lat,gpsDepX.lng);
  const result=getTarif(dist,extrasX);

  const btn=document.getElementById('btn-envoyer');
  btn.disabled=true;btn.textContent='Envoi...';

  const{data:all}=await sb.from('commandes').select('id');
  const newId='CMD'+String((all?.length||0)+1).padStart(3,'0');

  const{error}=await sb.from('commandes').insert({
    id:newId,
    commercant_id:currentUser.id,
    commercant_nom:currentUser.boutique,
    collecte_addr:colDesc,
    collecte_zone:currentUser.zone,
    depot_addr:depDesc,
    depot_zone:'GPS',
    colis,
    tarif:result.tarif,
    distance_km:dist,
    lat_boutique:gpsColX.lat,
    lng_boutique:gpsColX.lng,
    lat_client:gpsDepX.lat,
    lng_client:gpsDepX.lng,
    extra_lourd:extrasX.lourd,
    extra_express:extrasX.express,
    extra_nuit:extrasX.nuit,
    statut:'en-attente'
  });

  btn.disabled=false;btn.textContent='✅ Confirmer et envoyer la demande';
  if(error){toast('Erreur : '+error.message,'warning');return;}
  toast('✅ Demande '+newId+' envoyée ! Tarif : '+result.tarif.toLocaleString()+' F');
  setTimeout(()=>renderPage('cm-suivi'),1000);
}

// ============================================================
// LIVRAISONS EN SÉRIE
// ============================================================
let serie=[];
async function pageCmSerie(el){
  el.innerHTML=`
    <div class="sec-title">🚀 Livraisons en série</div>
    <div class="alert alert-info">Idéal pour envoyer plusieurs colis le matin. Ajoutez chaque livraison puis envoyez tout en une fois.</div>
    <div class="card">
      <div class="card-title">➕ Ajouter une livraison</div>
      <div class="fg"><label>Adresse de collecte (votre boutique)</label><input type="text" id="s-col" placeholder="Votre adresse"/></div>
      <div class="fg"><label>Coordonnées ou lien Maps de votre boutique</label><input type="text" id="s-col-gps" placeholder="12.3456, -1.6789 ou lien Google Maps"/></div>
      <div class="fg"><label>Coordonnées ou lien Maps du client</label><input type="text" id="s-dep-gps" placeholder="12.3456, -1.6789 ou lien Google Maps"/></div>
      <div class="fg"><label>Adresse descriptive du client</label><input type="text" id="s-dep" placeholder="Point de repère, nom du client..."/></div>
      <div class="form-row">
        <div class="fg"><label>Nature du colis</label><input type="text" id="s-colis" placeholder="Ex: Vêtements"/></div>
        <div class="fg"><label>Nom du client</label><input type="text" id="s-client" placeholder="Ex: Aminata"/></div>
      </div>
      <button class="btn btn-ghost" onclick="ajouterSerie()">+ Ajouter à la liste</button>
    </div>
    <div id="serie-liste"></div>
    <div id="serie-total" style="display:none">
      <div class="tarif-box">
        <div class="tarif-box-label">Récapitulatif</div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:14px;color:var(--texte-doux)" id="serie-count">0 livraisons</div>
          <div class="tarif-montant" id="serie-montant" style="font-size:36px">0 F</div>
        </div>
      </div>
      <button class="btn btn-green btn-full btn-big" onclick="envoyerSerie()">✅ Envoyer toutes les livraisons</button>
    </div>
  `;
  serie=[];renderSerie();
}

function ajouterSerie(){
  const col=document.getElementById('s-col')?.value.trim();
  const colGps=document.getElementById('s-col-gps')?.value.trim();
  const depGps=document.getElementById('s-dep-gps')?.value.trim();
  const dep=document.getElementById('s-dep')?.value.trim();
  const colis=document.getElementById('s-colis')?.value.trim();
  const client=document.getElementById('s-client')?.value.trim();

  if(!colis){toast('Nature du colis obligatoire','warning');return;}
  const coordsCol=colGps?extraireCoords(colGps):null;
  const coordsDep=depGps?extraireCoords(depGps):null;

  let dist=5,tarif=1000,livreur=800;
  if(coordsCol&&coordsDep){
    dist=haversine(coordsCol.lat,coordsCol.lng,coordsDep.lat,coordsDep.lng);
    const r=getTarif(dist);tarif=r.tarif;livreur=r.livreur;
  }

  serie.push({col:col||'Boutique',dep:dep||'Client',coordsCol,coordsDep,colis,client,tarif,livreur,dist});
  toast('✅ Livraison ajoutée ('+tarif.toLocaleString()+' F)');
  renderSerie();
  ['s-dep-gps','s-dep','s-colis','s-client'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
}

function renderSerie(){
  const el=document.getElementById('serie-liste');
  if(!el)return;
  if(!serie.length){el.innerHTML='';document.getElementById('serie-total').style.display='none';return;}
  const total=serie.reduce((s,i)=>s+i.tarif,0);
  el.innerHTML=`<div class="card"><div class="card-title">📋 Liste (${serie.length} livraisons)</div>`+
    serie.map((s,i)=>`<div class="serie-item">
      <div class="serie-num">${i+1}</div>
      <div class="serie-info">
        <div class="serie-addr">${s.client?s.client+' — ':''} ${s.dep}</div>
        <div class="serie-detail">${s.col} → ${s.dep} · ~${s.dist} km · 📦 ${s.colis}${s.coordsDep?` · GPS ✅`:' · ⚠️ GPS manquant'}</div>
      </div>
      <div style="text-align:right">
        <div class="serie-prix">${s.tarif.toLocaleString()} F</div>
        <div style="font-size:11px;color:var(--vert);font-weight:600">Livreur: ${s.livreur.toLocaleString()} F</div>
      </div>
      <button class="btn btn-ghost" style="padding:6px 10px;font-size:12px" onclick="retirerSerie(${i})">✕</button>
    </div>`).join('')+'</div>';
  document.getElementById('serie-total').style.display='block';
  document.getElementById('serie-count').textContent=serie.length+' livraison'+(serie.length>1?'s':'');
  document.getElementById('serie-montant').textContent=total.toLocaleString()+' F total';
}

function retirerSerie(i){serie.splice(i,1);renderSerie();}

async function envoyerSerie(){
  if(!serie.length)return;
  const btn=document.querySelector('#serie-total .btn-green');
  btn.disabled=true;btn.textContent='Envoi...';
  const{data:all}=await sb.from('commandes').select('id');
  let base=(all?.length||0),ok=0;
  for(const s of serie){
    base++;
    const newId='CMD'+String(base).padStart(3,'0');
    const{error}=await sb.from('commandes').insert({
      id:newId,commercant_id:currentUser.id,commercant_nom:currentUser.boutique,
      collecte_addr:s.col,collecte_zone:currentUser.zone,
      depot_addr:s.dep+(s.client?' ('+s.client+')':''),depot_zone:'GPS',
      colis:s.colis,tarif:s.tarif,distance_km:s.dist,
      lat_boutique:s.coordsCol?.lat||null,lng_boutique:s.coordsCol?.lng||null,
      lat_client:s.coordsDep?.lat||null,lng_client:s.coordsDep?.lng||null,
      statut:'en-attente'
    });
    if(!error)ok++;
  }
  btn.disabled=false;btn.textContent='✅ Envoyer toutes les livraisons';
  toast('✅ '+ok+' livraisons envoyées !');
  serie=[];
  setTimeout(()=>renderPage('cm-suivi'),1000);
}

async function pageCmSuivi(el){
  const{data:params}=await sb.from('parametres').select('*');
  const monTel=params?.find(p=>p.cle==='montel')?.valeur||'N/A';
  const{data:cmds}=await sb.from('commandes').select('*').eq('commercant_id',currentUser.id).order('created_at',{ascending:false});
  el.innerHTML=`<div class="sec-title">🔍 Mes livraisons</div>${renderCmds(cmds||[],monTel)}`;
}
